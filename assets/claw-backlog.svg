<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1 -4 26 21" role="img" aria-label="Clawdia revisando el backlog en su portapapeles">
  <style>
    .breathe { transform-origin: 7.5px 13px; animation: breathe 3.2s infinite ease-in-out; }
    .bow { transform-origin: 12.5px 5.5px; animation: bow-sway 2.8s infinite ease-in-out; }
    .eyes-read { animation: read-list 2.8s infinite; }
    .eyes-blink { transform-origin: 7.5px 9px; animation: blink 4.4s infinite linear; }
    .arm-r-hold { transform-origin: 14px 10px; transform: rotate(-32deg); }
    .heart { opacity: 0; transform-origin: 2.5px 2.5px; animation: heart-rise 3.2s infinite ease-out; }
    @keyframes breathe { 0%, 100% { transform: scale(1, 1) translate(0, 0); } 50% { transform: scale(1.02, 0.98) translate(0, 0.5px); } }
    @keyframes bow-sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(4deg); } }
    @keyframes read-list { 0%, 30% { transform: translate(0.5px, -0.3px); } 35%, 62% { transform: translate(0.5px, 0); } 67%, 100% { transform: translate(0.5px, 0.3px); } }
    @keyframes blink { 0%, 91%, 100% { transform: scaleY(1); } 94% { transform: scaleY(0.1); } }
    @keyframes heart-rise { 0% { opacity: 0; transform: translateY(0) scale(0.72); } 14% { opacity: 0.95; } 76% { opacity: 0.8; } 100% { opacity: 0; transform: translateY(-9px) scale(1.08); } }
    @media (prefers-reduced-motion: reduce) { .breathe, .bow, .eyes-read, .eyes-blink, .heart { animation: none; } .heart { opacity: .9; } }
  </style>
  <g shape-rendering="crispEdges">
    <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
    <rect x="17" y="15" width="6" height="1" fill="#000000" opacity="0.3"/>
    <g class="breathe">
      <g fill="#DE886D">
        <rect x="2" y="6" width="11" height="7"/>
        <rect x="0" y="9" width="2" height="2"/>
        <rect x="3" y="13" width="1" height="2"/>
        <rect x="5" y="13" width="1" height="2"/>
        <rect x="9" y="13" width="1" height="2"/>
        <rect x="11" y="13" width="1" height="2"/>
        <g class="arm-r-hold"><rect x="13" y="9" width="2" height="2"/></g>
      </g>
      <g class="eyes-blink" fill="#090909">
        <g class="eyes-read">
          <rect x="4" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
      </g>
      <g fill="#F06B9D">
        <rect x="3" y="10" width="1" height="1"/>
        <rect x="11" y="10" width="1" height="1"/>
      </g>
      <g class="bow">
        <rect x="10" y="4" width="2" height="2" fill="#FF6FAE"/>
        <rect x="13" y="4" width="2" height="2" fill="#FF6FAE"/>
        <rect x="11" y="3" width="1" height="1" fill="#FF91C1"/>
        <rect x="14" y="3" width="1" height="1" fill="#FF91C1"/>
        <rect x="12" y="5" width="1" height="1" fill="#D83B82"/>
      </g>
    </g>
    <g>
      <rect x="16.6" y="4.4" width="6.2" height="10.6" fill="#8D6E63"/>
      <rect x="17.2" y="5" width="5" height="9.4" fill="#F4F1EA"/>
      <rect x="18.7" y="3.6" width="2" height="1.6" fill="#546E7A"/>
      <rect x="17.8" y="6.4" width="1" height="1" fill="#58C08B"/>
      <rect x="19.3" y="6.6" width="2.4" height="0.6" fill="#9E9E9E"/>
      <rect x="17.8" y="8.6" width="1" height="1" fill="#58C08B"/>
      <rect x="19.3" y="8.8" width="2.4" height="0.6" fill="#9E9E9E"/>
      <rect x="17.8" y="10.8" width="1" height="1" fill="#CFCFCF"/>
      <rect x="19.3" y="11" width="2.4" height="0.6" fill="#9E9E9E"/>
      <rect x="17.8" y="12.8" width="1" height="1" fill="#CFCFCF"/>
      <rect x="19.3" y="13" width="2" height="0.6" fill="#9E9E9E"/>
    </g>
  </g>
  <g transform="translate(14.6 0.6) scale(0.42)">
    <path class="heart" d="M0 1h1V0h1v1h1V0h1v1h1v2H4v1H3v1H2V4H1V3H0z" fill="#FF5E9D"/>
  </g>
</svg>
