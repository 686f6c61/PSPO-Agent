<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7 -5 31 22" role="img" aria-label="Clawdia trabajando en el portatil con su cafe y una nota de Definition of Done">
  <style>
    .jitter { transform-origin: 7.5px 15px; animation: jitter 0.08s infinite alternate ease-in-out; }
    .bow { transform-origin: 12.5px 5.5px; animation: bow-work 0.55s infinite ease-in-out; }
    .arm-l-type { transform-origin: 2px 10px; animation: type-l 0.15s infinite ease-in-out; }
    .arm-r-type { transform-origin: 13px 10px; animation: type-r 0.12s infinite ease-in-out; }
    .eyes-read { animation: read-code 1.2s infinite; }
    .logo-glow { animation: logo-pulse 1.5s infinite alternate ease-in-out; }
    .steam { opacity: 0; animation: steam 2.4s infinite ease-out; }
    .s2 { animation-delay: 1.2s; }
    .heart { opacity: 0; transform-origin: 2.5px 2.5px; animation: heart-rise 2.5s infinite ease-out; }
    .h2 { animation-delay: -1.2s; }
    .note { transform-origin: -4px 0px; animation: note-sway 3.4s infinite ease-in-out; }
    @keyframes jitter { 0% { transform: translateY(0); } 100% { transform: translateY(0.5px); } }
    @keyframes bow-work { 0%, 100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-0.5px) rotate(5deg); } }
    @keyframes type-l { 0% { transform: rotate(70deg); } 25% { transform: rotate(110deg); } 50% { transform: rotate(80deg); } 75% { transform: rotate(100deg); } 100% { transform: rotate(70deg); } }
    @keyframes type-r { 0% { transform: rotate(-80deg); } 25% { transform: rotate(-100deg); } 50% { transform: rotate(-70deg); } 75% { transform: rotate(-110deg); } 100% { transform: rotate(-80deg); } }
    @keyframes read-code { 0%, 14% { transform: translate(-2px, 0); } 15%, 29% { transform: translate(-1px, 0); } 30%, 44% { transform: translate(0px, 0); } 45%, 59% { transform: translate(1px, 0); } 60%, 84% { transform: translate(2px, 0); } 85%, 100% { transform: translate(-2px, 0); } }
    @keyframes logo-pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    @keyframes steam { 0% { opacity: 0; transform: translateY(1px); } 40% { opacity: 0.8; } 100% { opacity: 0; transform: translateY(-3px); } }
    @keyframes heart-rise { 0% { opacity: 0; transform: translateY(0) scale(0.72); } 14% { opacity: 0.95; } 76% { opacity: 0.8; } 100% { opacity: 0; transform: translateY(-9px) scale(1.08); } }
    @keyframes note-sway { 0%, 100% { transform: rotate(-7deg); } 50% { transform: rotate(-3deg); } }
    @media (prefers-reduced-motion: reduce) { .jitter, .bow, .arm-l-type, .arm-r-type, .eyes-read, .logo-glow, .steam, .heart, .note { animation: none; } .steam, .heart { opacity: .7; } }
  </style>
  <g shape-rendering="crispEdges">
    <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
    <g class="jitter">
      <g fill="#DE886D">
        <rect x="2" y="6" width="11" height="7"/>
        <rect x="3" y="13" width="1" height="2"/>
        <rect x="5" y="13" width="1" height="2"/>
        <rect x="9" y="13" width="1" height="2"/>
        <rect x="11" y="13" width="1" height="2"/>
        <g class="arm-l-type"><rect x="0" y="9" width="2" height="2"/></g>
        <g class="arm-r-type"><rect x="13" y="9" width="2" height="2"/></g>
      </g>
      <g fill="#000000">
        <g class="eyes-read">
          <rect x="4" y="8.5" width="1" height="1"/>
          <rect x="10" y="8.5" width="1" height="1"/>
        </g>
      </g>
      <g fill="#F06B9D" opacity="0.78">
        <rect x="2.7" y="10.2" width="1" height="0.65"/>
        <rect x="11.3" y="10.2" width="1" height="0.65"/>
      </g>
      <g class="bow">
        <rect x="10" y="4" width="2" height="2" fill="#FF6FAE"/>
        <rect x="13" y="4" width="2" height="2" fill="#FF6FAE"/>
        <rect x="11" y="3" width="1" height="1" fill="#FF91C1"/>
        <rect x="14" y="3" width="1" height="1" fill="#FF91C1"/>
        <rect x="12" y="5" width="1" height="1" fill="#D83B82"/>
      </g>
    </g>
    <g transform="translate(3, 9.5)">
      <rect x="-0.5" y="5" width="10" height="1" fill="#546E7A" rx="0.5"/>
      <rect x="0" y="0" width="9" height="5.5" fill="#78909C" rx="0.5"/>
      <circle cx="4.5" cy="2.5" r="1.5" fill="#40C4FF" opacity="0.2" class="logo-glow"/>
      <rect x="4" y="2" width="1" height="1" fill="#FFFFFF" class="logo-glow"/>
    </g>
    <g>
      <rect class="steam" x="16.4" y="10.2" width="0.8" height="0.8" fill="#B0BEC5"/>
      <rect class="steam s2" x="17.6" y="10.2" width="0.8" height="0.8" fill="#B0BEC5"/>
      <rect x="16" y="12" width="2.4" height="2.6" fill="#ECECEC"/>
      <rect x="16" y="12" width="2.4" height="0.5" fill="#6D4C41"/>
      <rect x="18.6" y="12.6" width="0.7" height="1.2" fill="#ECECEC"/>
      <rect x="15.6" y="15" width="3.6" height="0.6" fill="#000000" opacity="0.3"/>
    </g>
    <g class="note">
      <rect x="-6.2" y="-1" width="5.6" height="5.2" fill="#FFD84A"/>
      <rect x="-4.6" y="-1.8" width="2.4" height="1" fill="#FFF3B0"/>
      <text x="-3.4" y="2.4" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="2" font-weight="700" fill="#121212">DoD</text>
    </g>
  </g>
  <g transform="translate(-2.6 4.5) scale(0.4)">
    <path class="heart" d="M0 1h1V0h1v1h1V0h1v1h1v2H4v1H3v1H2V4H1V3H0z" fill="#FF5E9D"/>
  </g>
  <g transform="translate(13.6 3.6) scale(0.34)">
    <path class="heart h2" d="M0 1h1V0h1v1h1V0h1v1h1v2H4v1H3v1H2V4H1V3H0z" fill="#FF5E9D"/>
  </g>
</svg>
