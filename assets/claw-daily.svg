<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -7 29 23" role="img" aria-label="Clawdia convocando la daily con un megafono">
  <style>
    .jitter { transform-origin: 7.5px 15px; animation: jitter 0.14s infinite alternate ease-in-out; }
    .bow { transform-origin: 12.5px 5.5px; animation: bow-work 0.9s infinite ease-in-out; }
    .eyes-blink { transform-origin: 7.5px 9px; animation: blink 3.8s infinite linear; }
    .arm-l-wave { transform-origin: 2px 10px; animation: wave 0.9s infinite ease-in-out; }
    .arm-r-mega { transform-origin: 14px 10px; transform: rotate(-24deg); }
    .snd { opacity: 0; animation: snd-fly 1.2s infinite linear; }
    .n2 { animation-delay: 0.4s; }
    .n3 { animation-delay: 0.8s; }
    @keyframes jitter { 0% { transform: translateY(0); } 100% { transform: translateY(0.4px); } }
    @keyframes bow-work { 0%, 100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-0.5px) rotate(5deg); } }
    @keyframes blink { 0%, 91%, 100% { transform: scaleY(1); } 94% { transform: scaleY(0.1); } }
    @keyframes wave { 0%, 100% { transform: rotate(35deg); } 50% { transform: rotate(80deg); } }
    @keyframes snd-fly { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 20% { opacity: 0.9; } 100% { transform: translate(6px, -4px) scale(1.15); opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .jitter, .bow, .eyes-blink, .arm-l-wave, .snd { animation: none; } .snd { opacity: .7; } .arm-l-wave { transform: rotate(55deg); } }
  </style>
  <g shape-rendering="crispEdges">
    <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
    <g class="jitter">
      <g fill="#DE886D">
        <rect x="2" y="6" width="11" height="7"/>
        <rect x="3" y="13" width="1" height="2"/>
        <rect x="5" y="13" width="1" height="2"/>
        <rect x="9" y="13" width="1" height="2"/>
        <rect x="11" y="13" width="1" height="2"/>
        <g class="arm-l-wave"><rect x="0" y="9" width="2" height="2"/></g>
        <g class="arm-r-mega"><rect x="13" y="9" width="2" height="2"/></g>
      </g>
      <g class="eyes-blink" fill="#090909">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
      <g fill="#F06B9D">
        <rect x="3" y="10" width="1" height="1"/>
        <rect x="11" y="10" width="1" height="1"/>
      </g>
      <g class="bow">
        <rect x="10" y="4" width="2" height="2" fill="#FF6FAE"/>
        <rect x="13" y="4" width="2" height="2" fill="#FF6FAE"/>
        <rect x="11" y="3" width="1" height="1" fill="#FF91C1"/>
        <rect x="14" y="3" width="1" height="1" fill="#FF91C1"/>
        <rect x="12" y="5" width="1" height="1" fill="#D83B82"/>
      </g>
      <g transform="rotate(-18 15.5 8.5)">
        <rect x="15" y="8" width="1" height="1.6" fill="#546E7A"/>
        <rect x="16" y="7.6" width="1" height="2.4" fill="#78909C"/>
        <rect x="17" y="7.1" width="1" height="3.4" fill="#78909C"/>
        <rect x="18" y="6.6" width="1" height="4.4" fill="#78909C"/>
        <rect x="19" y="6.3" width="0.7" height="5" fill="#546E7A"/>
      </g>
    </g>
    <g fill="#FFD84A">
      <rect class="snd" x="21" y="4.5" width="1.3" height="1.3"/>
      <rect class="snd n2" x="21.6" y="7" width="1.3" height="1.3"/>
      <rect class="snd n3" x="21" y="9.5" width="1.3" height="1.3"/>
    </g>
  </g>
</svg>
