# Canonico: sirve el sitio en pspo-agent.686f6c61.dev
server {
    listen 80;
    server_name pspo-agent.686f6c61.dev;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    location = /en { return 301 /en/; }
    location /en/ { try_files $uri $uri/ /en/index.html; }
    location / { try_files $uri $uri/ /index.html; }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
}

# Todo lo demas (pspo-agent.com, www.*, cualquier host) -> redirige al canonico
server {
    listen 80 default_server;
    server_name _;
    return 301 https://pspo-agent.686f6c61.dev$request_uri;
}
